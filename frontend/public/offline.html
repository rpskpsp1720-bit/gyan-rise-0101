<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B1E55" />
    <title>GYAN RISE — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: #0b1e55;
        color: #ffffff;
        font-family: Inter, system-ui, sans-serif;
      }
      .page {
        padding: 2rem;
        max-width: 520px;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 5vw, 3rem);
      }
      p {
        margin: 0.75rem 0;
        line-height: 1.7;
        color: #d1d5db;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.85rem 1.4rem;
        font-size: 1rem;
        color: #0b1e55;
        background: #f97316;
        border: none;
        border-radius: 9999px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Offline mode</h1>
      <p>GYAN RISE is currently offline. You can still use the app while the network is unavailable.</p>
      <p>When your connection returns, refresh to continue using the app.</p>
      <button onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
