name: Build Android APK & AAB

# Builds the GYAN RISE Android app on every push to main, on every
# tagged release, and on demand via "Run workflow" in the Actions tab.
#
# Outputs:
#   - app-debug.apk      (unsigned debug, easy to side-load for testing)
#   - app-release.apk    (signed release APK if signing secrets present)
#   - app-release.aab    (signed Google Play Store bundle)
#
# Required GitHub Secrets for signed release builds (Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64   Base64-encoded .jks file. Generate locally with:
#                               keytool -genkeypair -v -keystore gyanrise.jks \
#                                 -keyalg RSA -keysize 2048 -validity 10000 \
#                                 -alias gyanrise
#                               base64 -w0 gyanrise.jks > gyanrise.jks.b64
#                             Paste the .b64 contents as the secret.
#   ANDROID_KEYSTORE_PASSWORD Keystore password
#   ANDROID_KEY_ALIAS         Key alias (e.g. "gyanrise")
#   ANDROID_KEY_PASSWORD      Key password
#   CAPACITOR_LIVE_URL        (Optional) override the URL the WebView loads.
#                             Defaults to the value baked into capacitor.config.ts.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      live_url:
        description: 'Live URL the app should load (overrides capacitor.config.ts)'
        required: false

jobs:
  build:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --silent

      - name: Build React production bundle
        env:
          CI: false
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL || 'https://app-dev-358.preview.emergentagent.com' }}
        run: npm run build --silent

      - name: Capacitor sync
        env:
          CAPACITOR_LIVE_URL: ${{ inputs.live_url || secrets.CAPACITOR_LIVE_URL }}
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ---------- Debug APK (always built; useful for QA side-loading) ----------
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gyanrise-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ---------- Signed Release APK + AAB (only when keystore secrets exist) ----------
      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/gyanrise.jks
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/gyanrise.jks" >> $GITHUB_ENV

      - name: Build signed release APK
        if: env.KEYSTORE_PATH != ''
        working-directory: frontend/android
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon
            -PKEYSTORE_PATH=$KEYSTORE_PATH
            -PKEYSTORE_PASSWORD=$KEYSTORE_PASSWORD
            -PKEY_ALIAS=$KEY_ALIAS
            -PKEY_PASSWORD=$KEY_PASSWORD

      - name: Build signed release AAB (Play Store)
        if: env.KEYSTORE_PATH != ''
        working-directory: frontend/android
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon
            -PKEYSTORE_PATH=$KEYSTORE_PATH
            -PKEYSTORE_PASSWORD=$KEYSTORE_PASSWORD
            -PKEY_ALIAS=$KEY_ALIAS
            -PKEY_PASSWORD=$KEY_PASSWORD

      - name: Upload signed release APK
        if: env.KEYSTORE_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: gyanrise-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload Play Store AAB
        if: env.KEYSTORE_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: gyanrise-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
